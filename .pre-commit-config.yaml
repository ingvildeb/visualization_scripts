default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      - id: block-test-mode-true
        name: Block committing test_mode=True
        entry: python tools/check_no_test_mode_true.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push]
