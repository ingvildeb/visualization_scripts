# Allen hierarchy level to plot.
selected_hierarchy = 'CustomLevel5_gm'

# Optional parent region filter (set to '' for no parent filter).
specified_parent = ''

# Optional explicit regions by name. Leave empty to use hierarchy selection.
region_list = []

# Metric to plot: cell_counted, cell_density, or ROI_Volume_mm_3.
value_column = 'cell_density'

# Prefix for output filename.
out_filename_prefix = 'Example_linegraph'

# Output directory.
out_path = 'C:\Users\YourName\path\to\output'

# Output file format.
out_format = 'png'

# Plot title.
plot_title = 'Cell densities'

# X-axis title (group descriptor such as age/genotype/treatment).
x_axis_title = 'Group'

# If true, use atlas region colors. If false, use contrasting colormap colors.
use_region_colors = false

# Input ROI ID system: KimLab16bit or OriginalAllen.
id_system = 'KimLab16bit'

# Error metric for variability shading: 'se' (standard error) or 'sd' (standard deviation).
error_metric = 'se'

# Optional secondary grouping (example: sex) to split each region into multiple lines.
# Add a [secondary_grouping] table with the same sample IDs as [grouping].
# secondary_group_label controls legend text for that split.
secondary_group_label = 'Sex'

# Style cycles for secondary groups.
split_line_styles = ['-', '--', ':', '-.']
split_markers = ['o', 's', '^', 'D', 'v', 'P', 'X', '*']

[ids_to_files]
'sample_1' = 'C:\Users\YourName\path\to\sample_1_counted_3d_cells.csv'
'sample_2' = 'C:\Users\YourName\path\to\sample_2_counted_3d_cells.csv'
'sample_3' = 'C:\Users\YourName\path\to\sample_3_counted_3d_cells.csv'

[grouping]
'sample_1' = 'P6'
'sample_2' = 'P14'
'sample_3' = 'P28'

[secondary_grouping]
# Optional: assign subgroups to enable split lines.
# 'sample_1' = 'F'
# 'sample_2' = 'M'
# 'sample_3' = 'F'
